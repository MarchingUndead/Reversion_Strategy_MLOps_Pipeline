# Single source of truth. Edit here, nowhere else.
data_backend: "file"

paths:
  raw_futures: ["data/raw/2025", "data/raw/2022-24"]
  raw_equity:  ["data/raw/2025", "data/raw/2022-24"]
  raw_vix:     ["data/raw/2025/INDIAVIX.csv", "data/raw/2022-24/INDIAVIX.csv"]
  processed:   "data/processed"
  expiry_csv:  "data/raw/dates/expiry_dates.csv"
  trading_csv: "data/raw/dates/trading_calendar.csv"

symbols: ["RELIANCE", "BAJFINANCE"]

time_buckets:
  - ["09:15-10:00", "09:15", "10:00"]
  - ["10:00-11:00", "10:00", "11:00"]
  - ["11:00-12:00", "11:00", "12:00"]
  - ["12:00-13:00", "12:00", "13:00"]
  - ["13:00-14:00", "13:00", "14:00"]
  - ["14:00-15:00", "14:00", "15:00"]
  - ["15:00-15:30", "15:00", "15:30"]

detection:
  z_thresh: 2.5
  event_exit_threshold: 0.5
  reversion_window_min: 240
  cooldown_seconds: 60
  sigma_floor: 0.02
  continuation_extra_z: 0.75
  min_dwell_min: 10

distributions:
  min_obs: 200

vix:
  gate_max: 20.0
  rolling_1m: 20

training:
  holdout_year: 25

model:
  save_dir: "models/saved"
  ridge_alpha: 1.0
  features:
    - dte
    - bucket
    - direction
    - spread_t
    - spread_velocity_5tick
    - spread_accel_5tick
    - volume_zscore_20tick
    - oi_change_20tick
    - time_since_session_open_min
    - prior_spread_iqr_30tick
    - vix_level
    - dte_bucket_n_obs

mlflow:
  enabled: true
  tracking_uri: "http://mlflow:5000"
  experiment: "basis-reversion"