# Stores all paths, variables, etc.
# Acts as a SINGLE SOURCE OF TRUTH.
# Consumed by every src/*.py via yaml.safe_load at import.

paths:
  raw_root:    data/raw
  train_root:  data/raw/2022-24
  # test_root holds the evaluation-only data. preprocess ingests it under
  # `test_years` so distribution stats continue across 2022→2025, but the
  # model never trains on these rows — `split_events("train")` filters by
  # `train_range`. Hidden backtest is one-shot, gated by --confirm-holdout.
  test_root:   data/raw/2025
  dates:       data/raw/dates
  processed:   data/processed
  events:      data/events

symbols:      [BAJFINANCE, RELIANCE]
months:       [JAN, FEB, MAR, APR, MAY, JUN, JUL, AUG, SEP, OCT, NOV, DEC]
train_years:  ["22", "23", "24"]
test_years:   ["25"]
# Rolling near-month contracts whose ticks live in data/raw/2025/ but expire
# in early 2026. Ingested under the 2025 pass.
test_contracts_extra: ["JAN", "FEB", "MAR"]

buckets:      ["9:15:00", "10:00:00", "11:00:00", "12:00:00", "13:00:00", "14:00:00", "15:00:00"]

# --- service ports ----------------------------------------------------------
# Listening / connect ports for the FastAPI model server and the Streamlit UI.
# `serve.host` is the hostname Streamlit uses to reach the model server: inside
# the compose network it's the service name `serving`; from the host it's
# `localhost`. `serve.bind_host` is what serve.py binds to (0.0.0.0 in
# containers). Both serve.py and streamlit_app.py read these at startup.
serve:
  host:      serving
  bind_host: 0.0.0.0
  port:      5002
  # Local path to the MLflow file store on this host. serve.py and
  # streamlit_app.py construct artefact paths as
  # <mlruns_path>/<experiment_id>/<run_id>/artifacts/<artifact>, bypassing
  # the registry's stored absolute `source` field (which gets baked in as
  # /opt/airflow/project/mlruns/... when runs are written from a container
  # and breaks lookups from the Windows host).
  mlruns_path: ./mlruns

streamlit:
  port: 8501

schemas:
  fut: [day, time, fut_ltp, fut_ltq, oi_fut, fut_bidprice, fut_bidvol, fut_askprice, fut_askvol]
  eq:  [day, time, ltp, ltq, oi, eq_bidprice, eq_bidvol, eq_askprice, eq_askvol]
  vix: [day, time, vix, vol_vix, oi_vix]

preprocess:
  vix_thresh:    20
  warmup_months: 3
  vix_file:      INDIAVIX.csv

events:
  out_thresh: 2.0
  rev_thresh: 1.0
  min_ticks:  3

model:
  feature_cols:
    - det_z_score
    - det_spread
    - side
    - dte
    - bucket
    - det_dist_std
    - det_dist_count
    - det_fut_ltq
    - det_oi_fut
    - det_ltq
    - det_fut_ba
    - det_eq_ba
  # Split contract (YYYY-MM inclusive):
  #   train     2022-01..2023-12   — fit
  #   val       2024-01..2024-12   — primary backtest window (full 2024)
  #   dev_test  2024-07..2024-12   — narrower slice if you want H2-only
  #   hidden    2025-01..2025-12   — one-shot final eval, gated by --confirm-holdout
  train_range:    ["2022-01", "2024-05"]
  val_range:      ["2024-06", "2024-12"]
  dev_test_range: ["2024-07", "2024-12"]
  hidden_range:   ["2025-01", "2026-12"]
  # RF hyperparameters (consumed by train_position in src/model.py)
  rf_n_estimators:  200
  rf_max_depth:     10
  random_state:     42

backtest:
  positions:       [0, 1, 2]
  position_labels: [near, mid, far]
  lot_size:        10         # 1 lot = 10 units
  order_size:      1          # 1 lot per trade
  txn_cost_rate:   0.0001     # 0.01% of notional, charged on each leg

# --- model registry resolution
# Single source of truth for which MLflow Registry version backtest.py loads
# per (symbol, position) cell. The integer version applies to all 3 heads
# (classifier, duration, revert) of that cell — they came from the same
# winning grid run, so they're versioned together.
#

#registry:
#  versions:
#    BAJFINANCE:
#      0: 4    # near
#      1: 4    # mid
#      2: 4    # far
#    RELIANCE:
#      0: 4
#      1: 4
#      2: 4

# --- model-architecture grid sweep 
# (positions x model x n_estimators x max_depth x lr).
# Consumed by the Airflow DAG (dynamic mapping). Currently the smallest
# possible sweep: rf only, one hyperparam combo per position. With 3 positions
# this yields 3 mapped tasks — completes in approx 1 minute under the grid_search
# pool. Scale up by lengthening the lists below or re-enabling xgb.
grid:
  rf:
    n_estimators:  [200]
    max_depth:     [10]
    learning_rate: [0.1]        # ignored by rf, kept for symmetry
  xgb:
    n_estimators:  [200]
    max_depth:     [5]
    learning_rate: [0.1]