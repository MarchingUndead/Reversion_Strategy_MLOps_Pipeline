# Rendered to /etc/alertmanager/alertmanager.yml at compose-up by the
# alertmanager-init service (envsubst on this template). Variables come from
# .env (SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_APP_PASSWORD, ALERT_TO).
#
# To switch to a different transport (Slack, webhook, PagerDuty), replace the
# email_configs blocks below. The route tree above stays the same.

global:
  resolve_timeout: 5m
  smtp_smarthost: "${SMTP_HOST}:${SMTP_PORT}"
  smtp_from: "${SMTP_USER}"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_APP_PASSWORD}"
  smtp_require_tls: true

route:
  receiver: default-email
  group_by: ["alertname", "area", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts page faster on a separate receiver so subject lines stand out.
    - matchers:
        - severity="critical"
      receiver: critical-email
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: default-email
    email_configs:
      - to: "${ALERT_TO}"
        send_resolved: true
        headers:
          Subject: "[reversion][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"

  - name: critical-email
    email_configs:
      - to: "${ALERT_TO}"
        send_resolved: true
        headers:
          Subject: "[reversion][CRITICAL][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"

inhibit_rules:
  # If the server is down, suppress noisy downstream alerts (no traffic, etc.).
  - source_matchers: [alertname="ModelServerDown"]
    target_matchers: [area="serving"]
    equal: [job]
