# Minimal stack: just Streamlit.
#
# Run the batch pipeline on the host (via the venv) and mount ./models,
# ./data, and ./config.yaml into the container so Streamlit sees them.
#
#   docker compose up -d                # starts streamlit at :8501
#   docker compose run --rm pipeline python src/model.py      # optional
#   docker compose down

services:
  streamlit:
    build: .
    image: reversion:local
    container_name: reversion-streamlit
    restart: unless-stopped
    env_file: .env
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./config.yaml:/app/config.yaml:ro

  # Optional: run a pipeline stage inside the image.
  #   docker compose run --rm pipeline python src/model.py
  pipeline:
    image: reversion:local
    container_name: reversion-pipeline
    profiles: ["batch"]
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./config.yaml:/app/config.yaml:ro
    entrypoint: ["python"]
    command: ["src/model.py"]

  # ------------------------------------------------------------------
  # Monitoring stack. Scrapes src/serve.py running on the HOST at port 5002.
  #   docker compose up -d prometheus grafana
  #   prometheus: http://localhost:9090
  #   grafana:    http://localhost:3000   (admin / admin)
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: reversion-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - alertmanager

  # One-shot: renders alertmanager.template.yml into a shared volume with
  # SMTP creds substituted from .env. Runs before alertmanager starts.
  alertmanager-init:
    image: alpine:3.20
    container_name: reversion-alertmanager-init
    env_file: .env
    volumes:
      - ./monitoring/alertmanager.template.yml:/template/alertmanager.template.yml:ro
      - alertmanager_config:/rendered
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache gettext > /dev/null
        envsubst < /template/alertmanager.template.yml > /rendered/alertmanager.yml
        echo "alertmanager.yml rendered"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: reversion-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - alertmanager_config:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--log.level=debug"
    depends_on:
      alertmanager-init:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:11.2.0
    container_name: reversion-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # System metrics exporter. Reports the Docker VM's CPU/mem/disk — the
  # /:/host:ro,rslave mount + pid:host that you'd use on a Linux host don't
  # work on Docker Desktop (Windows/macOS), so we omit them. For real Windows
  # host metrics, install windows_exporter on the host and add a scrape job.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: reversion-node-exporter
    restart: unless-stopped
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  alertmanager_config:
