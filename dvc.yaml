# Pipeline DAG. Re-run affected stages with `dvc repro`.
# Run one stage only: `dvc repro <stage>`.
# Hidden-test stage is `frozen: true` and excluded from the default graph —
# run explicitly via `dvc repro backtest_hidden`.

stages:

  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw
      - config.yaml
    outs:
      - data/processed

  events:
    cmd: python src/events.py
    deps:
      - src/events.py
      - src/plots.py
      - data/processed
      - config.yaml
    outs:
      - data/events

  # Training is owned by MLflow (`src/mlflow_train.py` / `src/mlflow_grid.py`).
  # No DVC `train` stage; `models/` is not a DVC out. Backtest pulls the model
  # from MLflow at runtime — see backtest.py wiring (TODO, see report/ISSUES.md I-7).

  backtest:
    cmd: python src/backtest.py --split val
    deps:
      - src/backtest.py
      - src/model.py
      - src/plots.py
      - data/events
      - config.yaml
    outs:
      - data/backtest_logs/trades_position_0_near_val.csv
      - data/backtest_logs/trades_position_1_mid_val.csv
      - data/backtest_logs/trades_position_2_far_val.csv

  backtest_hidden:
    cmd: python src/backtest.py --split hidden --confirm-holdout
    deps:
      - src/backtest.py
      - src/model.py
      - data/events
      - config.yaml
    outs:
      - data/backtest_logs/trades_position_0_near_hidden.csv
      - data/backtest_logs/trades_position_1_mid_hidden.csv
      - data/backtest_logs/trades_position_2_far_hidden.csv
    frozen: true
